<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Undangan Pernikahan - Putri & Andika</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>💍 The Wedding of 💍</h1>
            <h2>Putri & Andika</h2>
            <p class="date">Sabtu, 12 April 2026</p>
            <p class="time">Pukul 10.00 WIB - Selesai</p>
            <p class="venue">Gedung Mutiara, Jakarta Selatan</p>
            
            <div class="countdown" id="countdown"></div>
            
            <!-- FORM RSVP ke Google Sheet -->
            <div class="rsvp-form">
                <h3>📝 Konfirmasi Kehadiran</h3>
                <input type="text" id="nama" placeholder="Nama lengkap" required>
                <select id="jumlahTamu">
                    <option value="1">1 orang</option>
                    <option value="2">2 orang</option>
                    <option value="3">3 orang</option>
                    <option value="4+">4+ orang</option>
                </select>
                <textarea id="pesan" placeholder="Ucapan & doa (opsional)"></textarea>
                <button id="submitRsvp">Kirim Konfirmasi</button>
                <div id="rsvpStatus"></div>
            </div>
        </div>
    </div>

    <!-- Musik latar opsional -->
    <audio id="bgMusic" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>
    <button id="musicToggle" class="music-btn">🔊 Putar Musik</button>

    <script src="script.js"></script>
</body>
</html>
